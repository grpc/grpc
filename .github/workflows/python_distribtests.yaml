name: Python Distribution Tests

on:
  pull_request:
    paths:
      - 'src/python/**'
      - 'tools/run_tests/artifacts/artifact_targets.py'
      - 'tools/run_tests/artifacts/distribtest_targets.py'
      - '.github/workflows/python_distribtests.yaml'

jobs:
  build_artifacts:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: python_manylinux2014_x64_cp39-cp39
            os: ubuntu-latest
          - target: python_manylinux2014_x86_cp39-cp39
            os: ubuntu-latest
          - target: python_linux_extra_armv7_cp39-cp39
            os: ubuntu-latest
          - target: python_musllinux_1_2_x64_cp39-cp39
            os: ubuntu-latest
          - target: python_musllinux_1_2_x86_cp39-cp39
            os: ubuntu-latest
          - target: python_macos_x64_python3.9
            os: macos-latest
            python-version: '3.9'
          - target: python_macos_x64_python3.14
            os: macos-latest
            python-version: '3.14'
          - target: python_windows_x86_Python39_32bit
            os: windows-latest
            python-version: '3.9'
            architecture: 'x86'
          - target: python_windows_x86_Python314_32bit
            os: windows-latest
            python-version: '3.14'
            architecture: 'x86'
          - target: python_windows_x64_Python39
            os: windows-latest
            python-version: '3.9'
            architecture: 'x64'
          - target: python_windows_x64_Python314
            os: windows-latest
            python-version: '3.14'
            architecture: 'x64'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Intel dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Install Intel Homebrew in /usr/local
          sudo mkdir -p /usr/local
          sudo chown -R $(whoami) /usr/local
          curl -L https://github.com/Homebrew/brew/tarball/master | tar xz --strip 1 -C /usr/local
          # Install x64 gettext and openssl using Intel Homebrew
          arch -x86_64 /usr/local/bin/brew install gettext openssl
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version || '3.10' }}
          architecture: ${{ matrix.architecture || 'x64' }}
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-python-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ccache-python-${{ matrix.target }}-
      - name: Build Artifact
        env:
          GRPC_BUILD_ENABLE_CCACHE: "true"
          DOCKER_EXTRA_ARGS: "-v ${{ github.workspace }}/.ccache:/ccache_dir -e CCACHE_DIR=/ccache_dir"
        run: |
          python tools/run_tests/task_runner.py -b ${{ matrix.target }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: artifacts/

  run_distribtests:
    needs: build_artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: python_linux_x64_bullseye
            os: ubuntu-latest
          - target: python_linux_x86_bullseye
            os: ubuntu-latest
          - target: python_linux_aarch64_python39_buster
            os: ubuntu-24.04-arm
          - target: python_linux_aarch64_alpine
            os: ubuntu-24.04-arm
          - target: python_dev_linux_x64_alpine3.18
            os: ubuntu-latest
          - target: python_dev_linux_x64_bullseye
            os: ubuntu-latest
          - target: python_dev_linux_x86_bullseye
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: input_artifacts/
      - name: Prepare input_artifacts directory structure
        run: |
          # Flatten the directory structure for downloaded artifacts
          mkdir -p flattened_input_artifacts
          find input_artifacts/ -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} flattened_input_artifacts/ \;
          rm -rf input_artifacts
          mv flattened_input_artifacts input_artifacts
          ls -R input_artifacts
      - name: Run Distribtest
        run: |
          python tools/run_tests/task_runner.py -b ${{ matrix.target }}
