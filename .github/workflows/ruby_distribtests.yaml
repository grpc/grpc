name: Ruby Distribution Tests

on:
  pull_request:
    paths:
      - 'src/ruby/**'
      - 'tools/run_tests/artifacts/artifact_targets.py'
      - 'tools/run_tests/artifacts/distribtest_targets.py'
      - '.github/workflows/ruby_distribtests.yaml'

jobs:
  build_artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ruby_native_gem_linux_x86_64-linux-gnu
            os: ubuntu-latest
          - target: ruby_native_gem_linux_x86_64-linux-musl
            os: ubuntu-latest
          - target: ruby_native_gem_linux_x86-linux-gnu
            os: ubuntu-latest
          - target: ruby_native_gem_linux_x86-linux-musl
            os: ubuntu-latest
          - target: ruby_native_gem_linux_aarch64-linux-gnu
            os: ubuntu-latest
          - target: ruby_native_gem_linux_aarch64-linux-musl
            os: ubuntu-latest
          - target: ruby_native_gem_linux_x86-mingw32
            os: ubuntu-latest
          - target: ruby_native_gem_linux_x64-mingw-ucrt
            os: ubuntu-latest
          - target: ruby_native_gem_linux_x86_64-darwin
            os: ubuntu-latest
          - target: ruby_native_gem_linux_arm64-darwin
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install Bundler
        run: |
          gem install bundler --user-install
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> $GITHUB_PATH
      - name: Build Artifact
        run: |
          tools/run_tests/task_runner.py -b ${{ matrix.target }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: artifacts/

  run_distribtests:
    needs: build_artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - ruby_linux-gnu_x64_debian11_version_ruby_3_1_package_type_binary
          - ruby_linux-gnu_x64_debian11_version_ruby_3_2_package_type_binary
          - ruby_linux-gnu_x64_debian11_version_ruby_3_3_package_type_binary
          - ruby_linux-gnu_x64_debian11_version_ruby_3_4_package_type_binary
          - ruby_linux-gnu_x64_debian11_version_ruby_4_0_package_type_binary
          - ruby_linux-gnu_x64_debian11_version_ruby_3_3_package_type_binary_protobuf_3.25
          - ruby_linux-gnu_x64_ubuntu2204_version_unspecified_package_type_binary
          - ruby_linux-gnu_x64_ubuntu2404_version_unspecified_package_type_binary
          - ruby_linux-musl_x64_alpine_version_ruby_3_1_package_type_binary
          - ruby_linux-musl_x64_alpine_version_ruby_3_2_package_type_binary
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: input_artifacts/
      - name: Prepare input_artifacts directory structure
        run: |
          mkdir -p flattened_input_artifacts
          find input_artifacts/ -type f -name "*.gem" -exec cp {} flattened_input_artifacts/ \;
          rm -rf input_artifacts
          mv flattened_input_artifacts input_artifacts
          ls -R input_artifacts
      - name: Run Distribtest
        run: |
          tools/run_tests/task_runner.py -b ${{ matrix.target }}
