- display_value: return x.ToString();
  encode: return x.ToSlice();
  name: GrpcAcceptEncodingMetadata
  parse_memento: return CompressionAlgorithmSet::FromString(value.as_string_view());
  repeatable: false
  storage: CompressionAlgorithmSet
- display_value: "switch (x) {\n      case GRPC_STATUS_OK:\n        return \"OK\"\
    ;\n      case GRPC_STATUS_CANCELLED:\n        return \"CANCELLED\";\n      case\
    \ GRPC_STATUS_UNKNOWN:\n        return \"UNKNOWN\";\n      case GRPC_STATUS_INVALID_ARGUMENT:\n\
    \        return \"INVALID_ARGUMENT\";\n      case GRPC_STATUS_DEADLINE_EXCEEDED:\n\
    \        return \"DEADLINE_EXCEEDED\";\n      case GRPC_STATUS_NOT_FOUND:\n  \
    \      return \"NOT_FOUND\";\n      case GRPC_STATUS_ALREADY_EXISTS:\n       \
    \ return \"ALREADY_EXISTS\";\n      case GRPC_STATUS_PERMISSION_DENIED:\n    \
    \    return \"PERMISSION_DENIED\";\n      case GRPC_STATUS_RESOURCE_EXHAUSTED:\n\
    \        return \"RESOURCE_EXHAUSTED\";\n      case GRPC_STATUS_FAILED_PRECONDITION:\n\
    \        return \"FAILED_PRECONDITION\";\n      case GRPC_STATUS_ABORTED:\n  \
    \      return \"ABORTED\";\n      case GRPC_STATUS_OUT_OF_RANGE:\n        return\
    \ \"OUT_OF_RANGE\";\n      case GRPC_STATUS_UNIMPLEMENTED:\n        return \"\
    UNIMPLEMENTED\";\n      case GRPC_STATUS_INTERNAL:\n        return \"INTERNAL\"\
    ;\n      case GRPC_STATUS_UNAVAILABLE:\n        return \"UNAVAILABLE\";\n    \
    \  case GRPC_STATUS_DATA_LOSS:\n        return \"DATA_LOSS\";\n      case GRPC_STATUS_UNAUTHENTICATED:\n\
    \        return \"UNAUTHENTICATED\";\n      default:\n        return \"<UNKNOWN>\";\n    }"
  encode: return Slice::FromInt64(x);
  name: GrpcStatusMetadata
  repeatable: false
  storage: grpc_status_code
- display_value: return x.ToString();
  name: GrpcTimeoutMetadata
