- compression: KnownValueCompressor<ValueType, kTrailers>
  display_value: if (x == kTrailers) return "trailers"; return "invalid";
  encode: "GRPC_CHECK(x == kTrailers);\n    return StaticSlice::FromStaticString(\"\
    trailers\");"
  enum:
    members:
    - kTrailers
    - kInvalid
    underlying_type: uint8_t
  name: TeMetadata
  parse_memento: if (value == StaticSlice::FromStaticString("trailers")) return kTrailers;
    return kInvalid;
  repeatable: false
  storage: TeMetadata::ValueType
