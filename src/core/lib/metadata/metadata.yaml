- display_value: return "<internal-lb-stats>";
  encode: abort();
  name: GrpcLbClientStatsMetadata
  parse_memento: "on_error(\"not a valid value for grpclb_client_stats\", Slice());\n\
    \    return nullptr;"
  repeatable: false
  storage: GrpcLbClientStats*
- display_value: 'return absl::StrCat(x.name, ":", x.cost);

    '
  encode: 'auto slice = MutableSlice::CreateUninitialized(sizeof(double) + x.name.length());

    memcpy(slice.data(), &x.cost, sizeof(double));

    memcpy(slice.data() + sizeof(double), x.name.data(), x.name.length());

    return Slice(std::move(slice));

    '
  name: LbCostBinMetadata
  parse_memento: "if (value.length() < sizeof(double)) {\n  on_error(\"too short\"\
    , value);\n  return {0, \"\"};\n}\nMementoType out;\nmemcpy(&out.cost, value.data(),\
    \ sizeof(double));\nout.name = std::string(reinterpret_cast<const char*>(value.data())\
    \ + sizeof(double), value.length() - sizeof(double));\nreturn out;\n"
  repeatable: true
  storage: LbCostBinMetadata::ValueType
